<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Andrey Mihai — Next Level</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>

<style>

/* ===============================
   🌌 BASE + BACKGROUND SYSTEM
================================ */
body{
  margin:0;
  font-family:Nunito;
  color:white;
  background:#050a0e;
  overflow-x:hidden;
}

/* Animated gradient background */
.bg-animated{
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 30%, #00ff8820, transparent 40%),
    radial-gradient(circle at 80% 70%, #00ccff20, transparent 40%),
    radial-gradient(circle at 50% 50%, #7c3aed20, transparent 50%);
  animation:moveBg 12s ease-in-out infinite alternate;
  z-index:-2;
}
@keyframes moveBg{
  0%{transform:translateY(0)}
  100%{transform:translateY(-40px)}
}

/* noise */
.noise{
  position:fixed;
  inset:0;
  background:url("https://grainy-gradients.vercel.app/noise.svg");
  opacity:.05;
  z-index:-1;
}

/* ===============================
   🧊 GLASS SYSTEM
================================ */
.glass{
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(30px) saturate(140%);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:20px;
  box-shadow:0 20px 60px rgba(0,0,0,.5);
  transition:.4s cubic-bezier(.22,1,.36,1);
}

.glass:hover{
  transform:translateY(-10px) scale(1.02);
  box-shadow:0 40px 100px rgba(0,0,0,.8);
}

/* ===============================
   💡 CURSOR LIGHT
================================ */
#cursor{
  position:fixed;
  width:400px;
  height:400px;
  pointer-events:none;
  background:radial-gradient(circle, rgba(0,255,136,.12), transparent 60%);
  transform:translate(-50%,-50%);
  z-index:1;
}

/* ===============================
   ✨ NAVBAR FLOAT
================================ */
.navbar{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  backdrop-filter:blur(20px);
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.1);
  padding:10px 20px;
  border-radius:40px;
  z-index:100;
}

/* ===============================
   🔥 HERO
================================ */
.hero-title{
  font-size:clamp(3rem,8vw,6rem);
  font-weight:900;
  background:linear-gradient(90deg,#00ff88,#00ccff,#7c3aed);
  -webkit-background-clip:text;
  color:transparent;
  animation:gradient 6s infinite linear;
}
@keyframes gradient{
  0%{background-position:0%}
  100%{background-position:200%}
}

/* ===============================
   ✨ BUTTON
================================ */
.btn{
  padding:12px 26px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.15);
  background:rgba(255,255,255,0.05);
  transition:.3s;
}
.btn:hover{
  background:rgba(0,255,136,.2);
  box-shadow:0 10px 30px rgba(0,255,136,.4);
}

/* ===============================
   🎬 ANIMATION
================================ */
.fade{
  opacity:0;
  transform:translateY(40px);
  transition:.9s cubic-bezier(.22,1,.36,1);
}
.fade.show{
  opacity:1;
  transform:none;
}

</style>
</head>

<body>

<div class="bg-animated"></div>
<div class="noise"></div>
<div id="cursor"></div>

<!-- NAV -->
<div class="navbar flex gap-6 text-sm">
  <a href="#about">About</a>
  <a href="#projects">Projects</a>
</div>

<!-- HERO -->
<section class="min-h-screen flex flex-col items-center justify-center text-center px-6">

<h1 class="hero-title mb-6">ANDREY MIHAI</h1>

<p class="text-gray-400 mb-8 font-mono">
<span id="type"></span><span class="cursor"></span>
</p>

<div class="flex gap-4">
<a class="btn" href="#projects">Ver proyectos</a>
<a class="btn" href="#contact">Contacto</a>
</div>

</section>

<!-- ABOUT -->
<section id="about" class="py-32 px-6 text-center">
<div class="glass max-w-3xl mx-auto p-10 fade">
<h2 class="text-3xl mb-4">Sobre mí</h2>
<p class="text-gray-400">
Desarrollador enfocado en experiencias visuales avanzadas,
addons de Minecraft y frontend moderno.
</p>
</div>
</section>

<!-- PROJECTS -->
<section id="projects" class="py-32 px-6">
<div class="max-w-6xl mx-auto grid md:grid-cols-2 gap-8">

<div class="glass p-8 fade">
<h3 class="text-xl mb-2">xA Addon</h3>
<p class="text-gray-400">Sistema PvP avanzado.</p>
</div>

<div class="glass p-8 fade">
<h3 class="text-xl mb-2">Kriptón Addon</h3>
<p class="text-gray-400">Addon competitivo.</p>
</div>

</div>
</section>

<!-- CONTACT -->
<section id="contact" class="py-32 text-center">
<a class="btn">GitHub</a>
</section>

<script>

/* cursor */
const c=document.getElementById("cursor");
window.onmousemove=e=>{
  c.style.left=e.clientX+"px";
  c.style.top=e.clientY+"px";
};

/* fade */
const obs=new IntersectionObserver(e=>{
  e.forEach(x=>{
    if(x.isIntersecting){
      x.target.classList.add("show");
    }
  });
});
document.querySelectorAll(".fade").forEach(el=>obs.observe(el));

/* typewriter */
const words=["Developer","Addon Creator","Designer"];
let i=0,j=0,d=false;
const el=document.getElementById("type");

function t(){
  let w=words[i];
  if(!d){
    el.textContent=w.slice(0,++j);
    if(j==w.length){d=true;setTimeout(t,1200);return;}
  }else{
    el.textContent=w.slice(0,--j);
    if(j==0){d=false;i=(i+1)%words.length;}
  }
  setTimeout(t,d?50:90);
}
t();

</script>

</body>
</html>
